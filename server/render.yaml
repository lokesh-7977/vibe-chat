services:
  - type: web
    name: vibe-chat-server
    runtime: docker
    repo: https://github.com/lokesh-7977/vibe-chat
    branch: master
    dockerfilePath: server/Dockerfile
    dockerContext: server
    healthCheckPath: /api/v1/health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: API_PREFIX
        value: /api/v1
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: vibe-chat-db
          property: connectionString
      - key: CORS_ALLOW_ORIGINS
        sync: false
      - key: ALGORITHM
        value: HS256
      - key: NVAPI_API_KEY
        sync: false
      - key: NVAPI_BASE_URL
        sync: false
      - key: NVAPI_CHAT_MODEL
        sync: false
      - key: EMBEDDING_API_KEY
        sync: false
      - key: R2_ENDPOINT_URL
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: R2_PUBLIC_BASE_URL
        sync: false
      - key: R2_PRESIGN_EXPIRES_SECONDS
        value: "3600"

databases:
  - name: vibe-chat-db
    databaseName: chatapp_db
    plan: free
